<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ffa600,#ee0979);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
padding:20px;
border-radius:18px;
width:100%;
max-width:500px;
text-align:center;
margin-top:40px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
}

.btn{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

.box{
background:rgba(255,255,255,0.25);
margin-top:10px;
padding:12px;
border-radius:10px;
cursor:pointer;
}

#loader{display:none;margin-top:15px;}
.progress{height:6px;background:rgba(255,255,255,0.3);}
.progress div{height:100%;width:0;background:#00c6ff;}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Vidzo Downloader</h2>

<input id="url" placeholder="Paste URL here">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="loader">
<div class="progress"><div id="bar"></div></div>
</div>

<div id="video"></div>
<div id="options"></div>

</div>

<script>
let URL="";
let videoData={};
let formatsData={};
let interval;

// AutoFetch
let timer;
document.getElementById("url").addEventListener("input", ()=>{
clearTimeout(timer);
timer=setTimeout(autoFetch,700);
});

async function autoFetch(){

URL=document.getElementById("url").value.trim();

if(!URL){
video.innerHTML="";
options.innerHTML="";
return;
}

// loader
loader.style.display="block";
bar.style.width="0%";
let p=0;

interval=setInterval(()=>{
if(p<90){p+=5;bar.style.width=p+"%";}
},200);

// API
let res=await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});

let data=await res.json();
videoData=data;

clearInterval(interval);
bar.style.width="100%";
setTimeout(()=>loader.style.display="none",400);

if(data.error){
video.innerHTML=data.error;
return;
}

video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}" width="200">
`;

options.innerHTML=`
<div class="box" onclick="fast()">⚡ FAST</div>
<div class="box" onclick="turbo()">🚀 TURBO</div>
`;
}

// FAST
function fast(){
if(videoData.is_short || videoData.is_social){
options.innerHTML=`
<div class="box" onclick="download('best','video')">MP4</div>
<div class="box" onclick="download('bestaudio','audio')">MP3</div>
`;
}else{
getFormats();
}
}

// TURBO
function turbo(){ fast(); }

// Formats
async function getFormats(){
let res=await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});
formatsData=await res.json();

options.innerHTML=`
<div class="box" onclick="showMP4()">MP4</div>
<div class="box" onclick="showMP3()">MP3</div>
`;
}

function showMP4(){
let html="";
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${v.format_id}','video')">${v.quality}</div>`;
});
options.innerHTML=html;
}

function showMP3(){
options.innerHTML=`
<div class="box" onclick="download('bestaudio','audio')">128kbps</div>
<div class="box" onclick="download('bestaudio','audio')">256kbps</div>
`;
}

// 🔥 ADSTERRA WORKING METHOD
function openAd(){
let a = document.createElement("a");
a.href = "https://www.profitabecpmratenetwork.com/e03jq01p?key=dba654ad0abd4feeda13436792f2ec85";
a.target = "_blank";
a.click();
}

// DOWNLOAD
function download(format_id,type){

openAd(); // ad trigger (mobile safe)

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,format_id,type})
})
.then(r=>r.json())
.then(d=>{
if(d.error){alert(d.error);return}
window.open(d.download_url);
});
}
</script>

</body>
</html>
