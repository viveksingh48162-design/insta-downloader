<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online🚀</title>

<style>
body {
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    text-align: center;
    color: white;
    font-family: Arial;
}

input { padding: 12px; width: 320px; border-radius: 10px; }

.btn {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.fast { background: orange; }
.turbo { background: red; }

.box {
    background: rgba(255,255,255,0.2);
    padding: 10px;
    margin: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>🚀 Vidzo Downloader</h1>

<input id="url" placeholder="Paste URL">
<br>
<button onclick="fetchVideo()">Get Video</button>

<div id="video"></div>
<div id="options"></div>

<script>

let URL = ""
let MODE = ""

function fetchVideo(){
    URL = document.getElementById("url").value

    document.getElementById("video").innerHTML = "Loading..."

    fetch("/get_video", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{
        if(data.error){
            alert(data.error)
            return
        }

        document.getElementById("video").innerHTML = `
            <h3>${data.title}</h3>
            <img src="${data.thumbnail}" width="200"><br>
            <button class="fast" onclick="choose('fast')">Fast</button>
            <button class="turbo" onclick="choose('turbo')">Turbo</button>
        `
    })
}

function choose(mode){
    MODE = mode

    fetch("/get_formats", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{
        let html = ""

        data.video.forEach(v=>{
            html += `<div class="box" onclick="download('${v.format_id}','video')">${v.quality}</div>`
        })

        data.audio.forEach(a=>{
            html += `<div class="box" onclick="download('${a.format_id}','audio')">${a.quality}</div>`
        })

        document.getElementById("options").innerHTML = html
    })
}

function download(format_id, type){
    fetch("/download", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            url: URL,
            format_id,
            type,
            mode: MODE
        })
    })
    .then(r=>r.json())
    .then(data=>{
        if(data.error){
            alert(data.error)
            return
        }

        window.open(data.download_url)
    })
}

</script>

</body>
</html>
