<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vidzo Downloader</title>

<link rel="stylesheet" href="mobile.css" media="(max-width: 768px)">
<link rel="stylesheet" href="desktop.css" media="(min-width: 769px)">

</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="topbar">
      <h2>🚀 Vidzo Pro</h2>
      <div class="toggle" onclick="toggleMode()">🌙</div>
    </div>

    <input id="url" placeholder="Paste URL here">

    <button onclick="fetchVideo()">📥 Get Video</button>

    <div id="options"></div>

    <div class="progress-container">
      <div class="progress-bar" id="bar"></div>
    </div>

    <p id="progressText">0%</p>

  </div>
</div>

<script>

let URL=""
let formatsData={}
let isShort=false

// 🌙 THEME
function toggleMode(){
document.body.classList.toggle("dark")
localStorage.setItem("mode",document.body.classList.contains("dark"))
}

if(localStorage.getItem("mode")==="true"){
document.body.classList.add("dark")
}

// 🔁 AUTO FETCH
document.getElementById("url").addEventListener("input",fetchVideo)

async function fetchVideo(){

URL=document.getElementById("url").value.trim()
if(!URL)return

bar.style.width="30%"

let res = await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

bar.style.width="100%"

if(data.error){
options.innerHTML=data.error
return
}

isShort = data.is_short || data.is_social

options.innerHTML=`
<div class="grid">
<div class="box" onclick="chooseMode('fast')">⚡ FAST</div>
<div class="box" onclick="chooseMode('turbo')">🚀 TURBO</div>
</div>
`
}

// STEP 2
function chooseMode(mode){

if(isShort){
options.innerHTML=`
<div class="grid">
<div class="box" onclick="download('video','${mode}')">🎬 MP4</div>
<div class="box" onclick="download('audio','${mode}')">🎧 MP3</div>
</div>`
return
}

options.innerHTML=`
<div class="grid">
<div class="box" onclick="getFormats('video','${mode}')">🎬 MP4</div>
<div class="box" onclick="getFormats('audio','${mode}')">🎧 MP3</div>
</div>
`
}

// QUALITY
async function getFormats(type,mode){

let res = await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

formatsData = await res.json()

let html=""

if(type=="video"){
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${type}','${mode}','${v.format_id}')">${v.quality}</div>`
})
}else{
html=`<div class="box" onclick="download('${type}','${mode}','best')">128kbps</div>`
}

options.innerHTML=html
}

// DOWNLOAD
function download(type,mode,format_id=null){

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,type:type,mode:mode,format_id:format_id})
})
.then(r=>r.json())
.then(d=>{
if(d.type==="direct"){
window.location.href=d.url
}else{
track(d.file,d.ext)
}
})
}

// PROGRESS
function track(file,ext){
let i=setInterval(()=>{
fetch("/progress/"+file)
.then(r=>r.json())
.then(p=>{
bar.style.width=p.progress+"%"
progressText.innerText=p.progress+"%"
if(p.progress==100){
clearInterval(i)
window.location.href="/file/"+file+"/"+ext
}
})
},1000)
}

</script>

</body>
</html>
