<!DOCTYPE html>
<html>
<head>
<title>Downloader Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 🔥 CARD UI */
.card{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
  color:white;
  margin-bottom:15px;
}

/* INPUT */
input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#ff4b5c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#ff2e43;
}

/* PREVIEW */
.preview{
  margin-top:15px;
}

.preview img{
  width:100%;
  border-radius:10px;
}

.timer{
  margin-top:10px;
  color:yellow;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h2>🔥 Vidzo Downloader</h2>

<input type="text" id="url" placeholder="Paste link here">

<button onclick="getPreview()">Get Video</button>

<select id="quality">
  <option value="360">360p</option>
  <option value="480">480p</option>
  <option value="720">720p</option>
  <option value="1080">1080p</option>
  <option value="mp3">MP3</option>
</select>

<button onclick="startDownload()">Download</button>

<div id="preview" class="preview"></div>

</div>

<script>

let currentURL = "";

function getPreview(){
  let url = document.getElementById("url").value;
  currentURL = url;

  fetch("/info?url="+encodeURIComponent(url))
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("preview").innerHTML = `
      <img src="${data.thumbnail}">
      <p style="color:white;margin-top:8px">${data.title}</p>
      <div class="timer" id="timer"></div>
    `;
  });
}

function startDownload(){

  let time = 5;

  let timer = setInterval(()=>{
    document.getElementById("timer").innerText =
      "Download starting in " + time + " sec...";

    time--;

    if(time < 0){
      clearInterval(timer);

      let form = document.createElement("form");
      form.method = "POST";
      form.action = "/download";

      let urlInput = document.createElement("input");
      urlInput.name = "url";
      urlInput.value = currentURL;

      let q = document.createElement("input");
      q.name = "quality";
      q.value = document.getElementById("quality").value;

      form.appendChild(urlInput);
      form.appendChild(q);

      document.body.appendChild(form);
      form.submit();
    }

  },1000);
}

</script>

</body>
</html>
