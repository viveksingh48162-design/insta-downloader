<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: Segoe UI, sans-serif;
    background: linear-gradient(-45deg, #ff4b2b, #ff416c, #ff7300);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* CARD */
.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 420px;
}

/* TITLE */
h1 {
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-bottom: 15px;
    text-align: center;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color: white;
    font-weight: bold;
}

/* OPTIONS */
.box {
    background: rgba(255,255,255,0.2);
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    cursor: pointer;
}

/* LOADER */
.loader {
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    margin: 15px auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* MOBILE FIX */
@media (max-width:600px){
    .container{
        width:95%;
        padding:20px;
    }
}
</style>

</head>
<body>

<div class="container">

<h1>🚀 Vidzo Pro Downloader</h1>

<input id="url" placeholder="Paste URL here">

<button class="btn" onclick="autoFetch()">📥 Get Video</button>

<div id="video"></div>
<div id="options"></div>

</div>

<script>

let URL = ""

function autoFetch(){

    URL = document.getElementById("url").value

    if(!URL){
        alert("Paste URL first")
        return
    }

    document.getElementById("video").innerHTML = `<div class="loader"></div>`
    document.getElementById("options").innerHTML = ""

    fetch("/get_video",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.error){
            document.getElementById("video").innerHTML = `
            <div style="color:#ff4d4d">
            ❌ ${data.error}
            </div>`
            return
        }

        document.getElementById("video").innerHTML = `
        <h3>${data.title}</h3>
        <img src="${data.thumbnail}" width="200">
        `

        loadFormats()
    })
}


function loadFormats(){

    fetch("/get_formats",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.error){
            document.getElementById("options").innerHTML = `
            <div style="color:#ff4d4d">
            ❌ ${data.error}
            </div>`
            return
        }

        let html = ""

        // SHORT (INSTA)
        if(data.short){
            html += `<div class="box" onclick="download('best','video')">🎬 MP4</div>`
            html += `<div class="box" onclick="downloadAudio()">🎧 MP3</div>`
        }
        else{
            data.video.forEach(v=>{
                html += `<div class="box" onclick="download('${v.format_id}','video')">🎬 ${v.quality}</div>`
            })

            html += `<div class="box" onclick="downloadAudio()">🎧 MP3</div>`
        }

        document.getElementById("options").innerHTML = html
    })
}


/* 🔥 MP3 SAFE FIX */
function downloadAudio(){
    download("bestaudio","audio")
}


/* DOWNLOAD */
function download(format_id,type){

    fetch("/download",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            url:URL,
            format_id,
            type
        })
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.error){
            document.getElementById("video").innerHTML = `
            <div style="color:#ff4d4d">
            ❌ YouTube blocked / Try another video
            </div>`
            return
        }

        window.open(data.download_url)
    })
}

</script>

</body>
</html>
