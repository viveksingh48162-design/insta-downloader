<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidzo Downloader</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4facfe,#8e44ad);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:25px;
    border-radius:20px;
    width:380px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* MOBILE FIX */
@media(max-width:500px){
    body{align-items:flex-end;}
    .container{
        width:90%;
        margin-bottom:40px;
    }
}

h2{
    color:white;
    margin-bottom:15px;
}

/* INPUT */
input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* VIDEO PREVIEW */
.video-box{
    margin-top:15px;
    color:white;
}

.video-box img{
    width:100%;
    border-radius:10px;
}

/* PROGRESS */
.progress{
    height:6px;
    background:#ccc;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#00ff99;
}

/* TIMER */
.timer{
    color:white;
    margin-top:8px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔥 Vidzo Downloader</h2>

<input type="text" id="url" placeholder="Paste link">

<button onclick="getVideo()">Get Video</button>

<select id="type">
    <option value="mp4">MP4</option>
    <option value="mp3">MP3</option>
</select>

<select id="quality"></select>

<div class="video-box" id="videoBox"></div>

<button onclick="download()">Download</button>

<div class="timer" id="timer"></div>

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

</div>

<script>
let currentPlatform = ""
let directLink = ""

// 🔥 GET VIDEO INFO
function getVideo(){
    let url = document.getElementById("url").value

    fetch("/info",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.error){
            alert(data.error)
            return
        }

        currentPlatform = data.platform
        directLink = data.direct || ""

        let box = document.getElementById("videoBox")
        box.innerHTML = `
            <img src="${data.thumbnail}">
            <p>${data.title}</p>
        `

        let q = document.getElementById("quality")
        q.innerHTML = ""

        // 🎥 YOUTUBE QUALITY
        if(data.platform==="youtube"){
            data.formats.forEach(f=>{
                q.innerHTML += `<option value="${f.format_id}">${f.quality}</option>`
            })
            q.style.display="block"
        }else{
            q.style.display="none"
        }
    })
}

// 🔥 DOWNLOAD
function download(){
    let url = document.getElementById("url").value
    let type = document.getElementById("type").value
    let format_id = document.getElementById("quality").value

    // 🔥 INSTA DIRECT
    if(directLink){
        window.open(directLink,"_blank")
        return
    }

    fetch("/download",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            url,
            type,
            format_id
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.error){
            alert(data.error)
            return
        }

        // 🔥 TIMER EFFECT
        let sec = 5
        let timer = document.getElementById("timer")
        let bar = document.getElementById("bar")

        let interval = setInterval(()=>{
            timer.innerText = "Downloading in "+sec+" sec..."
            bar.style.width = ((5-sec)*20)+"%"
            sec--

            if(sec<0){
                clearInterval(interval)
                window.location = "/file?id="+data.id
                timer.innerText=""
                bar.style.width="0%"
            }
        },1000)
    })
}
</script>

</body>
</html>
