<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ffa600,#ee0979);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.2);
}

h1{margin-bottom:20px;font-size:28px;}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
outline:none;
text-align:center;
font-size:14px;
}

.btn{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
font-weight:bold;
}

.box{
background:rgba(255,255,255,0.2);
margin-top:10px;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.box:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.3);
}

.loader{
margin:15px auto;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

img{
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Vidzo Downloader</h1>

<input id="url" placeholder="Paste URL here">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="video"></div>
<div id="options"></div>

</div>

<script>

let URL = ""
let videoData = {}

// 🔥 AUTO + BUTTON BOTH
document.getElementById("url").addEventListener("input", autoFetch)

async function autoFetch(){

URL = document.getElementById("url").value.trim()

// 🔄 reset
if(!URL){
video.innerHTML=""
options.innerHTML=""
return
}

video.innerHTML = '<div class="loader"></div>'

// 🔍 fetch
let res = await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()
videoData = data

if(data.error){
video.innerHTML="❌ "+data.error
return
}

// 🎬 show video
video.innerHTML = `
<h3>${data.title}</h3>
<img src="${data.thumbnail}" width="220">
`

// 🎯 STEP 1 → FAST / TURBO
options.innerHTML = `
<div class="box" onclick="fast()">⚡ FAST DOWNLOAD</div>
<div class="box" onclick="turbo()">🚀 TURBO DOWNLOAD</div>
`
}

// ⚡ FAST FLOW
function fast(){

// insta / shorts
if(videoData.is_short || videoData.is_insta){
options.innerHTML = `
<div class="box" onclick="download('best','fast','video')">🎥 MP4</div>
<div class="box" onclick="download('bestaudio','fast','audio')">🎧 MP3</div>
`
}

// youtube long
else{
options.innerHTML = `
<div class="box" onclick="download('best','fast','video')">🎥 MP4</div>
<div class="box" onclick="download('bestaudio','fast','audio')">🎧 MP3</div>
`
}
}

// 🚀 TURBO FLOW
async function turbo(){

// insta / shorts → no quality
if(videoData.is_short || videoData.is_insta){
options.innerHTML = `
<div class="box" onclick="download('best','turbo','video')">🎥 MP4</div>
<div class="box" onclick="download('bestaudio','turbo','audio')">🎧 MP3</div>
`
}

// youtube long → quality
else{

options.innerHTML = '<div class="loader"></div>'

let res = await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

let html = ""

// 🎥 video qualities
data.video.forEach(v=>{
html += `<div class="box" onclick="download('${v.format_id}','turbo','video')">🎥 ${v.quality}</div>`
})

// 🎧 audio
html += `<div class="box" onclick="download('bestaudio','turbo','audio')">🎧 MP3</div>`

options.innerHTML = html
}
}

// ⬇️ DOWNLOAD
function download(format_id,mode,type){

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
url:URL,
mode:mode,
format_id:format_id,
type:type
})
})
.then(r=>r.json())
.then(d=>{
if(d.error){
alert(d.error)
return
}
window.open(d.download_url)
})
}

</script>

</body>
</html>
