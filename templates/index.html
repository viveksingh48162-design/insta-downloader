<!DOCTYPE html>
<html>
<head>
<title>Vidzo Downloader</title>
<style>
body {
    background: linear-gradient(135deg,#5f9cff,#7f3fbf);
    font-family: Arial;
    text-align: center;
    color: white;
}
.box {
    margin: 80px auto;
    width: 300px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
}
input, select, button {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}
button {
    background: red;
    color: white;
    cursor: pointer;
}
img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="box">

<h2>🔥 Vidzo Downloader</h2>

<input id="url" placeholder="Paste link here">

<button onclick="getVideo()">Get Video</button>

<h3 id="title"></h3>

<img id="thumb">

<select id="type" onchange="toggleQuality()">
<option value="mp4">MP4</option>
<option value="mp3">MP3</option>
</select>

<select id="quality"></select>

<button onclick="download()">Download</button>

</div>

<script>

let currentPlatform = "";

async function getVideo() {
    const url = document.getElementById("url").value;

    const res = await fetch("/info", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url})
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    currentPlatform = data.platform;

    document.getElementById("title").innerText = data.title;
    document.getElementById("thumb").src = data.thumbnail;

    const quality = document.getElementById("quality");
    quality.innerHTML = "";

    if (data.platform === "youtube") {
        data.formats.forEach(f => {
            let opt = document.createElement("option");
            opt.value = f.format_id;
            opt.text = f.quality;
            quality.appendChild(opt);
        });
    }

    toggleQuality();
}

function toggleQuality() {
    const type = document.getElementById("type").value;
    const quality = document.getElementById("quality");

    if (type === "mp3" || currentPlatform === "instagram") {
        quality.style.display = "none";
    } else {
        quality.style.display = "block";
    }
}

async function download() {
    const url = document.getElementById("url").value;
    const type = document.getElementById("type").value;
    const format_id = document.getElementById("quality").value;

    const res = await fetch("/download", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url, type, format_id})
    });

    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "video";
    a.click();
}

</script>

</body>
</html>
