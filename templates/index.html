<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>

<style>
body {
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    font-family: Arial;
    text-align: center;
    color: white;
}

input {
    padding: 12px;
    width: 320px;
    border-radius: 10px;
    border: none;
}

.btn {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.get { background: #00c6ff; }
.fast { background: orange; }
.turbo { background: red; }

.box {
    background: rgba(255,255,255,0.2);
    margin: 8px;
    padding: 12px;
    cursor: pointer;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🚀 Vidzo Downloader</h1>

<input id="url" placeholder="Paste URL here">

<br>

<!-- ✅ GET VIDEO BUTTON -->
<button class="btn get" onclick="autoFetch()">🎬 Get Video</button>

<div id="video"></div>
<div id="options"></div>

<script>

let URL = ""
let MODE = ""

// 🔥 AUTO DETECT (optional)
document.getElementById("url").addEventListener("change", autoFetch)

function autoFetch(){
    URL = document.getElementById("url").value

    if(!URL){
        alert("Paste URL first")
        return
    }

    document.getElementById("video").innerHTML = "⏳ Loading..."

    fetch("/get_video",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.error){
            document.getElementById("video").innerHTML = data.error
            return
        }

        document.getElementById("video").innerHTML = `
            <h3>${data.title}</h3>
            <img src="${data.thumbnail}" width="220"><br>

            <button class="btn fast" onclick="choose('fast')">🚀 Fast Download</button>
            <button class="btn turbo" onclick="choose('turbo')">⚡ Turbo Download</button>
        `
    })
}

function choose(mode){
    MODE = mode

    document.getElementById("options").innerHTML = "⏳ Loading qualities..."

    fetch("/get_formats",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.error){
            document.getElementById("options").innerHTML = data.error
            return
        }

        let html = "<h2>🎬 Video</h2>"

        data.video.forEach(v=>{
            html += `<div class="box" onclick="download('${v.format_id}','video')">${v.quality}</div>`
        })

        html += "<h2>🎧 Audio</h2>"

        data.audio.forEach(a=>{
            html += `<div class="box" onclick="download('${a.format_id}','audio')">${a.quality}</div>`
        })

        document.getElementById("options").innerHTML = html
    })
}

function download(format_id, type){

    fetch("/download",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            url: URL,
            format_id,
            type,
            mode: MODE
        })
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.error){
            alert(data.error)
            return
        }

        // 🚀 FAST → direct
        // ⚡ TURBO → file download
        window.open(data.download_url)

    })
}

</script>

</body>
</html>
