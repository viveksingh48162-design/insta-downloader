<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
height:100vh;
font-family:Segoe UI;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ffa600,#ee0979);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
display:flex;
justify-content:center;
align-items:flex-start;
color:white;
padding-top:80px;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:500px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
margin-top:10px;
}

.btn{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

.box{
background:rgba(255,255,255,0.2);
margin-top:10px;
padding:10px;
border-radius:10px;
cursor:pointer;
}

#loader{display:none;margin-top:15px;}
.progress-bar{height:6px;background:rgba(255,255,255,0.2);}
.progress-fill{height:100%;width:0;background:#00c6ff;}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Vidzo Downloader</h2>

<input id="url" placeholder="Paste URL here">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="loader">
<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div id="video"></div>
<div id="options"></div>

</div>

<script>
let URL="";
let videoData={};
let formatsData={};
let progress=0;
let interval;

// ✅ AUTO FETCH
document.getElementById("url").addEventListener("input", autoFetch);

async function autoFetch(){

URL=document.getElementById("url").value.trim();

if(!URL){
video.innerHTML="";
options.innerHTML="";
return;
}

// 🔥 LOADER START
loader.style.display="block";
video.innerHTML="";
options.innerHTML="";
progress=0;

interval=setInterval(()=>{
if(progress<90){
progress+=5;
progressFill.style.width=progress+"%";
}
},200);

// API CALL
let res=await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});

let data=await res.json();
videoData=data;

clearInterval(interval);
progressFill.style.width="100%";
setTimeout(()=>{loader.style.display="none"},400);

// ERROR
if(data.error){
video.innerHTML=data.error;
return;
}

// SHOW VIDEO
video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}" width="200">
`;

// OPTIONS
options.innerHTML=`
<div class="box" onclick="fast()">⚡ FAST</div>
<div class="box" onclick="turbo()">🚀 TURBO</div>
`;
}

// ⚡ FAST
function fast(){

if(videoData.is_short || videoData.is_social){
options.innerHTML=`
<div class="box" onclick="download('best','video')">MP4</div>
<div class="box" onclick="download('bestaudio','audio')">MP3</div>
`;
}else{
getFormats();
}
}

// 🚀 TURBO
function turbo(){
fast();
}

// 🎯 GET FORMATS (YT LONG)
async function getFormats(){

let res=await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});

formatsData=await res.json();

options.innerHTML=`
<div class="box" onclick="showMP4()">MP4</div>
<div class="box" onclick="showMP3()">MP3</div>
`;
}

// 📹 MP4 QUALITY
function showMP4(){
let html="";
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${v.format_id}','video')">${v.quality}</div>`;
});
options.innerHTML=html;
}

// 🎧 MP3
function showMP3(){
options.innerHTML=`
<div class="box" onclick="download('bestaudio','audio')">128kbps</div>
<div class="box" onclick="download('bestaudio','audio')">256kbps</div>
`;
}

// ⬇ DOWNLOAD + DIRECT LINK AD
function download(format_id,type){

// 🔥 AD (earning)
window.open("https://omg10.com/4/10875597","_blank");

// DOWNLOAD
fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,format_id,type})
})
.then(r=>r.json())
.then(d=>{
if(d.error){alert(d.error);return}
window.open(d.download_url)
});
}

// 🔥 SERVICE WORKER REGISTER
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/sw.js')
.then(()=>console.log("SW Active"))
.catch(()=>console.log("SW Failed"));
}
</script>

</body>
</html>
