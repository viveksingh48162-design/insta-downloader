<!DOCTYPE html>
<html>
<head>
<title>Downloader Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* 🌍 BODY */
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

/* 📦 CONTAINER */
.container{
  width:95%;
  max-width:420px;
  background: rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  backdrop-filter: blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* 🖥️ DESKTOP */
@media (min-width:768px){
  .container{
    max-width:500px;
    padding:30px;
  }
}

/* 📱 MOBILE */
@media (max-width:480px){
  .container{
    width:95%;
    padding:15px;
    border-radius:12px;
  }
}

/* 🔥 INPUT */
input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

/* 🔥 BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#ff4b5c;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff2e43;
}

/* 🎥 PREVIEW */
.preview img{
  width:100%;
  border-radius:10px;
  margin-top:20px;
}

/* 📊 PROGRESS */
.progress-bar{
  width:100%;
  background:#ccc;
  border-radius:10px;
  margin-top:15px;
  height:10px;
}

.progress{
  height:100%;
  background:limegreen;
  width:0%;
  border-radius:10px;
}

/* 📝 TITLE */
h2{
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🔥 Downloader Pro</h2>

<input type="text" id="url" placeholder="Paste link">

<select id="type">
  <option value="video">Video</option>
  <option value="mp3">MP3</option>
</select>

<select id="quality"></select>

<button onclick="getInfo()">Get Video</button>

<div id="preview" class="preview"></div>

<div class="progress-bar">
  <div id="progress" class="progress"></div>
</div>

<button onclick="startDownload()">Download</button>

</div>

<script>

let file_id = "";

/* GET INFO */
function getInfo(){
  let url = document.getElementById("url").value;

  fetch("/info", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ url:url })
  })
  .then(res=>res.json())
  .then(data=>{

    document.getElementById("preview").innerHTML = `
      <img src="${data.thumbnail}">
      <h3>${data.title}</h3>
    `;

    let q = document.getElementById("quality");
    q.innerHTML = "";

    data.formats.forEach(f=>{
      let opt = document.createElement("option");
      opt.value = f.format_id;
      opt.text = f.quality;
      q.appendChild(opt);
    });

  });
}

/* DOWNLOAD */
function startDownload(){
  let url = document.getElementById("url").value;
  let type = document.getElementById("type").value;
  let format_id = document.getElementById("quality").value;

  fetch("/download", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      url:url,
      type:type,
      format_id:format_id
    })
  })
  .then(res=>res.json())
  .then(data=>{
    file_id = data.id;
    trackProgress();
  });
}

/* PROGRESS */
function trackProgress(){
  let interval = setInterval(()=>{
    fetch("/progress")
    .then(res=>res.json())
    .then(data=>{
      document.getElementById("progress").style.width =
        data.percent + "%";

      if(data.percent >= 100){
        clearInterval(interval);
        window.location = "/file?id=" + file_id;
      }
    });
  },1000);
}

</script>

</body>
</html>
