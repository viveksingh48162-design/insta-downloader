<!DOCTYPE html>
<html>
<head>
<title>🚀 Vidzo Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

:root{
--bg: linear-gradient(135deg,#ff6a6a,#6a8dff);
--card: rgba(255,255,255,0.15);
--text:#fff;
--btn: linear-gradient(90deg,#00c6ff,#0072ff);
}

.dark{
--bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
--card: rgba(0,0,0,0.4);
--text:#fff;
--btn: linear-gradient(90deg,#ff512f,#dd2476);
}

body{
min-height:100vh;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
color:var(--text);
transition:0.3s;
}

.container{
width:100%;
max-width:520px;
margin:10px;
background:var(--card);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

@media(max-width:600px){
body{align-items:flex-start;padding-top:25px;}
.container{margin:10px;}
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.toggle{
cursor:pointer;
padding:6px 12px;
border-radius:10px;
background:rgba(255,255,255,0.2);
font-size:12px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
outline:none;
}

.btn{
margin-top:12px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:var(--btn);
color:#fff;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.box{
background:rgba(255,255,255,0.2);
padding:14px;
border-radius:12px;
cursor:pointer;
text-align:center;
transition:0.2s;
}

.box:hover{transform:scale(1.05);}

#loader{display:none;margin-top:15px;}

.progress-bar{
height:6px;
background:#ccc;
border-radius:10px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#00c6ff;
transition:0.3s;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* HISTORY */
.history{
margin-top:15px;
text-align:left;
max-height:150px;
overflow:auto;
}

.history-item{
padding:8px;
font-size:12px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.fade{
animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<b>🚀 Vidzo Ultimate</b>
<div class="toggle" onclick="toggleMode()">🌙</div>
</div>

<input id="url" placeholder="Paste video URL here">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="loader">
<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div id="video"></div>
<div id="options"></div>

<div class="history" id="history"></div>

</div>

<script>

let URL=""
let formatsData={}
let progress=0
let interval

// 🌙 MODE
function toggleMode(){
document.body.classList.toggle("dark")
localStorage.setItem("mode",document.body.classList.contains("dark"))
}

if(localStorage.getItem("mode")==="true"){
document.body.classList.add("dark")
}

// HISTORY
function addHistory(text){
let h = document.getElementById("history")
let item = document.createElement("div")
item.className="history-item fade"
item.innerText=text
h.prepend(item)
}

// AUTO FETCH
document.getElementById("url").addEventListener("input",autoFetch)

async function autoFetch(){

URL=document.getElementById("url").value.trim()
if(!URL){video.innerHTML="";options.innerHTML="";return;}

loader.style.display="block"
video.innerHTML=""
options.innerHTML=""

progress=0
interval=setInterval(()=>{
if(progress<90){
progress+=10
progressFill.style.width=progress+"%"
}
},150)

let res = await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

clearInterval(interval)
progressFill.style.width="100%"
setTimeout(()=>loader.style.display="none",300)

if(data.error){
video.innerHTML=data.error
return
}

video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}">
`

// SHORTS
if(data.is_short || data.is_social){
options.innerHTML=`
<div class="grid">
<div class="box" onclick="fast('video')">⚡ MP4</div>
<div class="box" onclick="fast('audio')">🎧 MP3</div>
</div>
`
return
}

// NORMAL
options.innerHTML=`
<div class="grid">
<div class="box" onclick="fast('video')">⚡ FAST MP4</div>
<div class="box" onclick="fast('audio')">⚡ FAST MP3</div>
</div>
<div class="box" onclick="turbo()">🚀 TURBO HD</div>
`
}

// FAST
function fast(type){
addHistory("FAST "+type)

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,type:type,mode:"fast"})
})
.then(r=>r.json())
.then(d=>{
if(d.type==="direct"){
window.location.href=d.url
}else{
window.location.href="/file/"+d.file+"/"+d.ext
}
})
}

// TURBO
async function turbo(){
options.innerHTML="Loading quality..."

let res = await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

formatsData = await res.json()

options.innerHTML=`
<div class="box" onclick="showMP4()">🎬 MP4</div>
<div class="box" onclick="showMP3()">🎧 MP3</div>
`
}

// MP4
function showMP4(){
let html=""
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${v.format_id}','video','turbo')">${v.quality}</div>`
})
options.innerHTML=html
}

// MP3
function showMP3(){
options.innerHTML=`
<div class="box" onclick="download('best','audio','turbo')">128kbps</div>
`
}

// DOWNLOAD
function download(format_id,type,mode){
addHistory("TURBO "+type)

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,format_id,type,mode})
})
.then(r=>r.json())
.then(d=>{
if(d.type==="direct"){
window.location.href=d.url
}else{
window.location.href="/file/"+d.file+"/"+d.ext
}
})
}

</script>

</body>
</html>
