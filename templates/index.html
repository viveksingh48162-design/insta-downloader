<!DOCTYPE html>
<html>
<head>
<title>🚀 Vidzo Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

:root{
--bg: linear-gradient(135deg,#ff6a6a,#6a8dff);
--card: rgba(255,255,255,0.15);
--text:#fff;
--btn: linear-gradient(90deg,#00c6ff,#0072ff);
}

.dark{
--bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
--card: rgba(0,0,0,0.4);
--text:#fff;
--btn: linear-gradient(90deg,#ff512f,#dd2476);
}

/* BODY CENTER FIX */
body{
min-height:100vh;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
color:var(--text);
}

/* ✅ PERFECT CONTAINER */
.container{
width:92%;
max-width:420px;
margin:auto;
background:var(--card);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* MOBILE FIX */
@media(max-width:600px){
.container{
width:92%;
max-width:420px;
padding:18px;
}
}

/* TOPBAR */
.topbar{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
margin-bottom:15px;
}

.logo{
font-size:22px;
font-weight:bold;
text-align:center;
}

.toggle{
justify-self:end;
padding:4px 10px;
font-size:12px;
border-radius:20px;
background:rgba(255,255,255,0.2);
cursor:pointer;
}

/* INPUT */
input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
outline:none;
}

/* BUTTON */
.btn{
margin-top:12px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:var(--btn);
color:#fff;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* OPTIONS */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.box{
background:rgba(255,255,255,0.2);
padding:14px;
border-radius:12px;
cursor:pointer;
text-align:center;
}

/* IMAGE */
img{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* PROGRESS */
#loader{display:none;margin-top:10px;}

.progress-bar{
height:6px;
background:#ccc;
border-radius:10px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#00c6ff;
}

/* HISTORY */
.history{
margin-top:15px;
font-size:12px;
max-height:120px;
overflow:auto;
}

.history-item{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<div></div>
<div class="logo">🚀 Vidzo Downloader</div>
<div class="toggle" onclick="toggleMode()">🌙</div>
</div>

<input id="url" placeholder="Paste video URL">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="loader">
<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div id="video"></div>
<div id="options"></div>

<div class="history" id="history"></div>

</div>

<script>

let URL=""
let formatsData={}

// 🌙 MODE
function toggleMode(){
document.body.classList.toggle("dark")
localStorage.setItem("mode",document.body.classList.contains("dark"))
}

if(localStorage.getItem("mode")==="true"){
document.body.classList.add("dark")
}

// HISTORY
function addHistory(text){
let h=document.getElementById("history")
let d=document.createElement("div")
d.className="history-item"
d.innerText=text
h.prepend(d)
}

// FETCH
async function autoFetch(){

URL=document.getElementById("url").value.trim()
if(!URL){return;}

loader.style.display="block"
progressFill.style.width="0%"

let res = await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

progressFill.style.width="100%"
setTimeout(()=>loader.style.display="none",300)

if(data.error){
video.innerHTML=data.error
return
}

video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}">
`

options.innerHTML=`
<div class="grid">
<div class="box" onclick="fast('video')">⚡ MP4</div>
<div class="box" onclick="fast('audio')">🎧 MP3</div>
</div>
<div class="box" onclick="turbo()">🚀 TURBO HD</div>
`
}

// FAST
function fast(type){
addHistory("FAST "+type)

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,type:type,mode:"fast"})
})
.then(r=>r.json())
.then(d=>{
if(d.type==="direct"){
window.location.href=d.url
}else{
trackProgress(d.file,d.ext)
}
})
}

// TURBO
async function turbo(){
options.innerHTML="Loading..."

let res = await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

formatsData=await res.json()

options.innerHTML=`
<div class="box" onclick="showMP4()">🎬 MP4</div>
<div class="box" onclick="showMP3()">🎧 MP3</div>
`
}

// MP4
function showMP4(){
let html=""
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${v.format_id}','video','turbo')">${v.quality}</div>`
})
options.innerHTML=html
}

// MP3
function showMP3(){
options.innerHTML=`
<div class="box" onclick="download('best','audio','turbo')">128kbps</div>
`
}

// DOWNLOAD
function download(format_id,type,mode){
addHistory("TURBO "+type)

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,format_id,type,mode})
})
.then(r=>r.json())
.then(d=>{
if(d.type==="direct"){
window.location.href=d.url
}else{
trackProgress(d.file,d.ext)
}
})
}

// PROGRESS
function trackProgress(file,ext){
let i=setInterval(()=>{
fetch("/progress/"+file)
.then(r=>r.json())
.then(p=>{
progressFill.style.width=p.progress+"%"
if(p.progress==100){
clearInterval(i)
window.location.href="/file/"+file+"/"+ext
}
})
},1000)
}

</script>

</body>
</html>
