<!DOCTYPE html>
<html>
<head>
<title>Vidzo Downloader</title>

<style>
body {
    background: linear-gradient(135deg,#5f9cff,#7f3fbf);
    font-family: Arial;
    text-align: center;
    color: white;
}
.box {
    margin: 80px auto;
    width: 300px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
}
input, select, button {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}
button { background:red; color:white; }

.progress {
    height: 10px;
    background: #ddd;
    border-radius: 10px;
}
.bar {
    height: 10px;
    width: 0%;
    background: lime;
}
</style>
</head>

<body>

<div class="box">

<h2>🔥 Vidzo Downloader</h2>

<input id="url" placeholder="Paste link" oninput="resetUI()">

<button onclick="getVideo()">Get Video</button>

<h3 id="title"></h3>
<img id="thumb">

<select id="type" onchange="resetUI()">
<option value="mp4">MP4</option>
<option value="mp3">MP3</option>
</select>

<select id="quality" onchange="resetUI()"></select>

<button onclick="startDownload()">Download</button>

<div class="progress"><div class="bar" id="bar"></div></div>

<p id="status">0%</p>

</div>

<script>

let platform = "";

function resetUI() {
    document.getElementById("bar").style.width = "0%";
    document.getElementById("status").innerText = "Reset";
}

async function getVideo() {
    resetUI();

    let url = document.getElementById("url").value;

    let res = await fetch("/info", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url})
    });

    let data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    platform = data.platform;

    document.getElementById("title").innerText = data.title;
    document.getElementById("thumb").src = data.thumbnail;

    let q = document.getElementById("quality");
    q.innerHTML = "";

    if(platform === "youtube"){
        data.formats.forEach(f=>{
            let o = document.createElement("option");
            o.value = f.format_id;
            o.text = f.quality;
            q.appendChild(o);
        });
    }
}

async function startDownload(){
    let url = document.getElementById("url").value;
    let type = document.getElementById("type").value;
    let format_id = document.getElementById("quality").value;

    await fetch("/download", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url,type,format_id})
    });

    track();
}

async function track(){
    let interval = setInterval(async ()=>{
        let res = await fetch("/progress");
        let data = await res.json();

        document.getElementById("bar").style.width = data.percent + "%";
        document.getElementById("status").innerText =
            data.percent + "% | " + data.speed;

        if(data.percent >= 100){
            clearInterval(interval);
            window.location = "/file";
        }

    },1000);
}

</script>

</body>
</html>
