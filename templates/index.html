<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online🚀</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #36d1dc, #5b86e5, #ff6a00, #ee0979);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* 🔥 animated background */
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 💎 glass card */
.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 420px;
    box-shadow: 0 0 40px rgba(0,0,0,0.2);
}

/* title */
h1 {
    margin-bottom: 20px;
    font-size: 28px;
}

/* input */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 14px;
    text-align: center;
}

/* button */
.btn {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00c6ff;
}

/* cards */
.box {
    background: rgba(255,255,255,0.2);
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.box:hover {
    background: rgba(255,255,255,0.35);
    transform: scale(1.05);
}

/* spinner */
.loader {
    margin: 15px auto;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

img {
    margin-top: 10px;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Vidzo Pro Downloader</h1>

<input id="url" placeholder="Paste URL here">
<button class="btn" onclick="autoFetch()">📥 Get Video</button>

<div id="video"></div>
<div id="options"></div>

</div>

<script>

let URL = ""

/* 🔥 auto fetch on paste */
document.getElementById("url").addEventListener("change", autoFetch)

function autoFetch(){
    URL = document.getElementById("url").value

    if(!URL){
        alert("Paste URL first")
        return
    }

    document.getElementById("video").innerHTML = '<div class="loader"></div>'

    fetch("/get_video", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.error){
            document.getElementById("video").innerHTML = data.error
            return
        }

        document.getElementById("video").innerHTML =
        `<h3>${data.title}</h3>
         <img src="${data.thumbnail}" width="220"><br>`

        loadFormats()
    })
}

/* 🎯 formats */
function loadFormats(){

    fetch("/get_formats", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{

        let html = ""

        if(data.short){
            html += `<div class="box" onclick="download('best','video')">🎥 MP4</div>`
            html += `<div class="box" onclick="download('best','audio')">🎧 MP3</div>`
        } else {
            data.video.forEach(v=>{
                html += `<div class="box" onclick="download('${v.format_id}','video')">${v.quality}</div>`
            })
            html += `<div class="box" onclick="download('best','audio')">🎧 MP3</div>`
        }

        document.getElementById("options").innerHTML = html
    })
}

/* 🚀 download */
function download(format_id, type){
    fetch("/download", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            url:URL,
            format_id,
            type
        })
    })
    .then(r=>r.json())
    .then(data=>{
        if(data.error){
            alert(data.error)
            return
        }
        window.open(data.download_url)
    })
}

</script>

</body>
</html>
