<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidzo Downloader</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a6a,#6a8dff);
color:#fff;
}

/* DESKTOP CARD */
.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* 📱 MOBILE FIX */
@media(max-width:600px){
body{
align-items:flex-start;
padding-top:20px;
}

.container{
width:95%;
max-width:100%;
padding:18px;
border-radius:16px;
}
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.logo{
font-size:20px;
font-weight:bold;
}

.toggle{
padding:5px 10px;
border-radius:20px;
background:rgba(255,255,255,0.2);
cursor:pointer;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
}

.btn{
margin-top:10px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
font-weight:bold;
}

.box{
background:rgba(255,255,255,0.2);
padding:14px;
border-radius:12px;
text-align:center;
margin-top:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

img{
width:100%;
margin-top:10px;
border-radius:10px;
}

#loader{display:none;margin-top:10px;}
.progress-fill{height:5px;background:#00c6ff;width:0%;}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<div class="logo">🚀 Vidzo</div>
<div class="toggle">🌙</div>
</div>

<input id="url" placeholder="Paste video URL">
<button class="btn" onclick="fetchVideo()">Get Video</button>

<div id="loader"><div class="progress-fill" id="bar"></div></div>

<div id="video"></div>
<div id="options"></div>

</div>

<script>

let URL=""
let formatsData={}
let isShort=false

// 🔁 AUTO FETCH
document.getElementById("url").addEventListener("input",fetchVideo)

async function fetchVideo(){

URL=document.getElementById("url").value.trim()
if(!URL)return

loader.style.display="block"
bar.style.width="30%"

let res=await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data=await res.json()

bar.style.width="100%"
setTimeout(()=>loader.style.display="none",300)

if(data.error){
video.innerHTML=data.error
return
}

isShort = data.is_short || data.is_social

video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}">
`

// 🎯 STEP 1: FAST / TURBO
options.innerHTML=`
<div class="grid">
<div class="box" onclick="chooseMode('fast')">⚡ FAST</div>
<div class="box" onclick="chooseMode('turbo')">🚀 TURBO</div>
</div>
`
}

// 🔥 STEP 2
function chooseMode(mode){

// SHORTS
if(isShort){
options.innerHTML=`
<div class="grid">
<div class="box" onclick="download('video','${mode}')">🎬 MP4</div>
<div class="box" onclick="download('audio','${mode}')">🎧 MP3</div>
</div>
`
return
}

// LONG VIDEO
options.innerHTML=`
<div class="grid">
<div class="box" onclick="getFormats('video','${mode}')">🎬 MP4</div>
<div class="box" onclick="getFormats('audio','${mode}')">🎧 MP3</div>
</div>
`
}

// 🎬 GET QUALITY
async function getFormats(type,mode){

let res=await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

formatsData=await res.json()

let html=""

if(type=="video"){
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${type}','${mode}','${v.format_id}')">${v.quality}</div>`
})
}else{
html=`<div class="box" onclick="download('${type}','${mode}','best')">128kbps</div>`
}

options.innerHTML=html
}

// 🚀 DOWNLOAD
function download(type,mode,format_id=null){

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
url:URL,
type:type,
mode:mode,
format_id:format_id
})
})
.then(r=>r.json())
.then(d=>{
if(d.type=="direct"){
window.location.href=d.url
}else{
track(d.file,d.ext)
}
})
}

// 📊 PROGRESS
function track(file,ext){
let i=setInterval(()=>{
fetch("/progress/"+file)
.then(r=>r.json())
.then(p=>{
bar.style.width=p.progress+"%"
if(p.progress==100){
clearInterval(i)
window.location.href="/file/"+file+"/"+ext
}
})
},1000)
}

</script>

</body>
</html>
