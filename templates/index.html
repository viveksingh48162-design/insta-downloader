<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
font-family:Segoe UI;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ffa600,#ee0979);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.2);
}

h1{margin-bottom:15px;}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
text-align:center;
}

.box{
background:rgba(255,255,255,0.2);
margin-top:10px;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.box:hover{
transform:scale(1.05);
}

.loader{
margin:15px auto;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
<h1>🚀 Vidzo Downloader</h1>

<input id="url" placeholder="Paste URL here...">

<div id="video"></div>
<div id="options"></div>

</div>

<script>

let URL = ""

// 🔥 AUTO FETCH
document.getElementById("url").addEventListener("input", autoFetch)

async function autoFetch(){
URL = document.getElementById("url").value.trim()

// 🔄 RESET instantly
if(!URL){
video.innerHTML=""
options.innerHTML=""
return
}

// ⏳ loader
video.innerHTML = '<div class="loader"></div>'

// 🔍 fetch video info
let res = await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

if(data.error){
video.innerHTML = "❌ " + data.error
return
}

// 🎬 show video
video.innerHTML = `
<h3>${data.title}</h3>
<img src="${data.thumbnail}" width="220">
`

// ⚡ show modes
options.innerHTML = `
<div class="box" onclick="fastDownload()">⚡ FAST DOWNLOAD</div>
<div class="box" onclick="turboMode()">🚀 TURBO DOWNLOAD</div>
`
}

// ⚡ FAST DOWNLOAD
function fastDownload(){
fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
url:URL,
mode:"fast"
})
})
.then(r=>r.json())
.then(d=>{
if(d.error){
alert(d.error)
return
}
window.open(d.download_url)
})
}

// 🚀 TURBO MODE
async function turboMode(){

options.innerHTML = '<div class="loader"></div>'

// 📦 get formats
let res = await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

let html = ""

// 🎥 video qualities
data.video.forEach(v=>{
html += `<div class="box" onclick="download('${v.format_id}','video')">🎥 ${v.quality}</div>`
})

// 🎧 audio
html += `<div class="box" onclick="download('bestaudio','audio')">🎧 MP3</div>`

options.innerHTML = html
}

// ⬇️ DOWNLOAD
function download(format_id,type){
fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
url:URL,
mode:"turbo",
format_id,
type
})
})
.then(r=>r.json())
.then(d=>{
if(d.error){
alert(d.error)
return
}
window.open(d.download_url)
})
}

</script>

</body>
</html>
