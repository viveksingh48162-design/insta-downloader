<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ff9966,#ee0979);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:15px;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
padding:20px;
border-radius:18px;
width:100%;
max-width:500px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
margin-top:20px;
}

h2{
margin-bottom:10px;
font-size:22px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:14px;
outline:none;
}

.btn{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.box{
background:rgba(255,255,255,0.25);
margin-top:10px;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
font-size:14px;
}

.box:hover{transform:scale(1.04);}

img{
width:100%;
max-width:250px;
margin-top:10px;
border-radius:10px;
}

#loader{display:none;margin-top:15px;}

.progress{
height:6px;
background:rgba(255,255,255,0.3);
border-radius:10px;
overflow:hidden;
}

.progress div{
height:100%;
width:0%;
background:#00c6ff;
transition:0.3s;
}

/* 📱 MOBILE FIX */
@media(max-width:480px){

body{
padding:10px;
}

.container{
padding:15px;
border-radius:15px;
}

h2{
font-size:18px;
}

input{
font-size:13px;
padding:10px;
}

.btn{
font-size:14px;
padding:10px;
}

.box{
font-size:13px;
padding:10px;
}

img{
max-width:200px;
}

}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Vidzo Ultra Downloader</h2>

<input id="url" placeholder="Paste video URL here">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="loader">
<div class="progress"><div id="bar"></div></div>
</div>

<div id="video"></div>
<div id="options"></div>
</div>

<script>
let URL="";
let videoData={};
let formatsData={};
let interval;

let timer;
document.getElementById("url").addEventListener("input", ()=>{
clearTimeout(timer);
timer=setTimeout(autoFetch,800);
});

async function autoFetch(){

URL=document.getElementById("url").value.trim();

if(!URL){
video.innerHTML="";
options.innerHTML="";
return;
}

loader.style.display="block";
bar.style.width="0%";

let p=0;
interval=setInterval(()=>{
if(p<90){p+=5;bar.style.width=p+"%";}
},200);

let res=await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});

let data=await res.json();
videoData=data;

clearInterval(interval);
bar.style.width="100%";
setTimeout(()=>loader.style.display="none",400);

if(data.error){
video.innerHTML="<p>"+data.error+"</p>";
return;
}

video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}">
`;

options.innerHTML=`
<div class="box" onclick="fast()">⚡ FAST</div>
<div class="box" onclick="turbo()">🚀 TURBO</div>
`;
}

function fast(){
if(videoData.is_short || videoData.is_social){
options.innerHTML=`
<div class="box" onclick="download('best','video')">⚡ Instant MP4</div>
<div class="box" onclick="download('bestaudio','audio')">⚡ Instant MP3</div>
`;
}else{
getFormats();
}
}

function turbo(){
fast();
}

async function getFormats(){

let res=await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});

formatsData=await res.json();

options.innerHTML=`
<div class="box" onclick="showMP4()">🎬 MP4 (HD Quality)</div>
<div class="box" onclick="showMP3()">🎧 MP3</div>
`;
}

function showMP4(){
let html="";
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${v.format_id}','video')">${v.quality}</div>`;
});
options.innerHTML=html;
}

function showMP3(){
options.innerHTML=`
<div class="box" onclick="download('bestaudio','audio')">128kbps</div>
<div class="box" onclick="download('bestaudio','audio')">256kbps</div>
`;
}

function download(format_id,type){

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,format_id,type})
})
.then(r=>r.json())
.then(d=>{
if(d.error){
alert(d.error);
return;
}

if(d.type === "direct"){
window.open(d.url);
}

if(d.type === "file"){
window.open("/file/"+d.file);
}

});
}
</script>

</body>
</html>
