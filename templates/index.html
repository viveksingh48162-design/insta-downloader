<!DOCTYPE html>
<html>
<head>
<title>🔥 Vidzo Downloader</title>

<style>
body {
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: sans-serif;
    color: white;
    text-align: center;
}
.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}
.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}
input,select,button {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}
button {
    background:red;
    color:white;
    font-weight:bold;
}
img {
    width:100%;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>🔥 Vidzo Downloader</h2>

<input id="url" placeholder="Paste link here">

<button onclick="getVideo()">Get Video</button>

<h3 id="title"></h3>

<img id="thumb" style="display:none">

<select id="type">
<option value="mp4">MP4</option>
<option value="mp3">MP3</option>
</select>

<select id="quality" style="display:none">
<option>360</option>    
<option>720p</option>
<option>1080p</option>
<option>2160</option>    
</select>

<button onclick="downloadNow()">⬇ Download Now</button>

</div>
</div>

<script>

let currentUrl="";

// 🎯 GET INFO
async function getVideo(){

let url=document.getElementById("url").value;
currentUrl=url;

let res=await fetch("/info",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url})
});

let data=await res.json();

if(data.error){
alert(data.error);
return;
}

document.getElementById("title").innerText=data.title;

// thumbnail
if(data.thumbnail){
document.getElementById("thumb").src=data.thumbnail;
document.getElementById("thumb").style.display="block";
}

// youtube only quality
if(data.is_youtube){
document.getElementById("quality").style.display="block";
}else{
document.getElementById("quality").style.display="none";
}

}


// 🚀 DOWNLOAD
async function downloadNow(){

let type=document.getElementById("type").value;

let res=await fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
url:currentUrl,
type:type
})
});

let data=await res.json();

if(data.error){
alert(data.error);
return;
}

// 🔥 redirect to API
window.open(data.api,"_blank");

}

</script>

</body>
</html>
