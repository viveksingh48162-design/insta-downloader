<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Segoe UI;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ffa600,#ee0979);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.12);
padding:20px;
border-radius:15px;
width:100%;
max-width:500px;
text-align:center;
}

input{width:100%;padding:12px;border-radius:10px;border:none;}
.btn{margin-top:10px;padding:12px;width:100%;border:none;background:#00c6ff;color:white;border-radius:10px;}

.box{margin-top:10px;padding:12px;background:rgba(255,255,255,0.3);border-radius:10px;cursor:pointer;}

#loader{display:none;margin-top:10px;}
.progress{height:6px;background:#333;}
.progress div{height:100%;width:0;background:#00c6ff;}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Vidzo Downloader</h2>

<input id="url" placeholder="Paste URL">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="loader">
<div class="progress"><div id="bar"></div></div>
</div>

<div id="video"></div>
<div id="options"></div>
</div>

<script>
let URL="";
let videoData={};
let formatsData={};

document.getElementById("url").addEventListener("input", autoFetch);

async function autoFetch(){

URL=document.getElementById("url").value.trim();

if(!URL){
video.innerHTML="";
options.innerHTML="";
return;
}

loader.style.display="block";
bar.style.width="0%";
let p=0;

let interval=setInterval(()=>{
if(p<90){p+=5;bar.style.width=p+"%";}
},200);

let res=await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});

let data=await res.json();
videoData=data;

clearInterval(interval);
bar.style.width="100%";
setTimeout(()=>loader.style.display="none",400);

video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}" width="200">
`;

options.innerHTML=`
<div class="box" onclick="fast()">FAST</div>
<div class="box" onclick="turbo()">TURBO</div>
`;
}

function fast(){
if(videoData.is_short || videoData.is_social){
options.innerHTML=`
<div class="box" onclick="startDownload('best','video')">MP4</div>
<div class="box" onclick="startDownload('bestaudio','audio')">MP3</div>
`;
}else{
getFormats();
}
}

function turbo(){ fast(); }

async function getFormats(){
let res=await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});
formatsData=await res.json();

options.innerHTML=`
<div class="box" onclick="showMP4()">MP4</div>
<div class="box" onclick="showMP3()">MP3</div>
`;
}

function showMP4(){
let html="";
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="startDownload('${v.format_id}','video')">${v.quality}</div>`;
});
options.innerHTML=html;
}

function showMP3(){
options.innerHTML=`
<div class="box" onclick="startDownload('bestaudio','audio')">128kbps</div>
<div class="box" onclick="startDownload('bestaudio','audio')">256kbps</div>
`;
}

// 👉 Vegas funnel start
function startDownload(format_id,type){
window.location.href = `/gate?url=${encodeURIComponent(URL)}&f=${format_id}&t=${type}`;
}
</script>

</body>
</html>
