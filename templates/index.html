<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
font-family:Segoe UI, sans-serif;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ffa600,#ee0979);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
display:flex;
justify-content:center;
align-items:flex-start;
color:white;
padding:20px;
padding-top:80px;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.2);
width:95%;
max-width:500px;
}

h1{
margin-bottom:20px;
font-size:28px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
outline:none;
font-size:14px;
text-align:center;
}

.btn{
margin-top:15px;
padding:12px;
width:100%;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00c6ff;
}

.box{
background:rgba(255,255,255,0.2);
margin-top:10px;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.box:hover{
background:rgba(255,255,255,0.35);
transform:scale(1.05);
}

img{
margin-top:10px;
border-radius:10px;
width:100%;
max-width:220px;
}

/* ✈️ NEW LOADER */
#loader{
margin-top:15px;
text-align:center;
display:none;
}

.plane-loader{
font-size:40px;
animation:fly 1.5s infinite ease-in-out;
}

@keyframes fly{
0%{transform:translateX(-20px) rotate(-10deg);}
50%{transform:translateX(20px) rotate(10deg);}
100%{transform:translateX(-20px) rotate(-10deg);}
}

#loader p{
font-size:14px;
margin-top:5px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">
<h1>🚀 Vidzo Downloader</h1>

<input id="url" placeholder="Paste URL here">
<button class="btn" onclick="autoFetch()">Get Video</button>

<!-- ✈️ LOADER -->
<div id="loader">
  <div class="plane-loader">✈️</div>
  <p>Loading video...</p>
</div>

<div id="video"></div>
<div id="options"></div>

</div>

<script>

let URL=""

document.getElementById("url").addEventListener("change", autoFetch)

function autoFetch(){
URL=document.getElementById("url").value

if(!URL){
alert("Paste URL first")
return
}

/* SHOW LOADER */
document.getElementById("loader").style.display="block"
document.getElementById("video").innerHTML=""
document.getElementById("options").innerHTML=""

fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})
.then(r=>r.json())
.then(data=>{

/* HIDE LOADER */
document.getElementById("loader").style.display="none"

if(data.error){
document.getElementById("video").innerHTML=data.error
return
}

document.getElementById("video").innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}">
`

loadFormats()
})
}

function loadFormats(){

fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})
.then(r=>r.json())
.then(data=>{

let html=""

if(data.short){

html+=`<div class="box" onclick="download('best','video')">⚡ Fast MP4</div>`
html+=`<div class="box" onclick="download('best','audio')">🎵 Fast MP3</div>`
html+=`<div class="box" onclick="download('turbo_mp4','video')">🚀 Turbo MP4</div>`
html+=`<div class="box" onclick="download('turbo_mp3','audio')">🚀 Turbo MP3</div>`

}else{

html+=`<div class="box" onclick="showFast()">⚡ Fast Download</div>`
html+=`<div class="box" onclick="showTurbo()">🚀 Turbo Download</div>`

}

document.getElementById("options").innerHTML=html
})
}

function showFast(){
let html=""

html+=`<div class="box" onclick="download('best','video')">MP4</div>`
html+=`<div class="box" onclick="download('best','audio')">MP3</div>`

document.getElementById("options").innerHTML=html
}

function showTurbo(){
let html=""

html+=`<div class="box" onclick="download('360','video')">360p</div>`
html+=`<div class="box" onclick="download('720','video')">720p</div>`
html+=`<div class="box" onclick="download('1080','video')">1080p</div>`
html+=`<div class="box" onclick="download('2160','video')">4K</div>`
html+=`<div class="box" onclick="download('128','audio')">MP3 128k</div>`
html+=`<div class="box" onclick="download('256','audio')">MP3 256k</div>`

document.getElementById("options").innerHTML=html
}

function download(format_id,type){

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
url:URL,
format_id,
type
})
})
.then(r=>r.json())
.then(data=>{

if(data.error){
alert(data.error)
return
}

window.open(data.download_url)
})
}

</script>

</body>
</html>
