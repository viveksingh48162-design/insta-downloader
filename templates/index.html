<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online 🚀</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
font-family:Segoe UI;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ffa600,#ee0979);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.2);
}

h1{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
text-align:center;
}

.btn{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
font-weight:bold;
}

.box{
background:rgba(255,255,255,0.2);
margin-top:10px;
padding:10px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.box:hover{
transform:scale(1.05);
}

.loader{
margin:15px auto;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
<h1>🚀 Vidzo Downloader</h1>

<input id="url" placeholder="Paste URL here...">

<div id="video"></div>
<div id="options"></div>

</div>

<script>
let URL = ""

// 🔥 AUTO FETCH (paste + typing)
document.getElementById("url").addEventListener("input", autoFetch)

async function autoFetch(){
URL = document.getElementById("url").value.trim()

// ⚡ instant reset
if(!URL){
document.getElementById("video").innerHTML=""
document.getElementById("options").innerHTML=""
return
}

document.getElementById("video").innerHTML = '<div class="loader"></div>'

// 🚀 FAST FETCH VIDEO INFO
let res = await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

if(data.error){
document.getElementById("video").innerHTML=data.error
return
}

// 🎬 show info
document.getElementById("video").innerHTML = `
<h3>${data.title}</h3>
<img src="${data.thumbnail}" width="220">
`

loadFormats()
}

// 📦 LOAD FORMATS
async function loadFormats(){
let res = await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

let html = ""

// ⚡ insta shortcut
if(data.short){
html += `<div class="box" onclick="download('best','video')">🎥 MP4</div>`
html += `<div class="box" onclick="download('bestaudio','audio')">🎧 MP3</div>`
}else{
data.video.forEach(v=>{
html += `<div class="box" onclick="download('${v.format_id}','video')">🎥 ${v.quality}</div>`
})

html += `<div class="box" onclick="download('bestaudio','audio')">🎧 MP3</div>`
}

document.getElementById("options").innerHTML = html
}

// ⬇️ DOWNLOAD
function download(format_id,type){
fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
url:URL,
format_id,
type
})
})
.then(r=>r.json())
.then(data=>{
if(data.error){
alert(data.error)
return
}
window.open(data.download_url)
})
}
</script>

</body>
</html>
