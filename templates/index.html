<!DOCTYPE html>
<html>
<head>
<title>Vidzo Downloader</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background: linear-gradient(135deg,#5f9cff,#7b3fe4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    text-align:center;
}

input,select,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button{
    background:red;
    color:white;
    font-weight:bold;
}

img{
    width:100%;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>🔥 Vidzo Downloader</h2>

<input id="url" placeholder="Paste link">

<button onclick="getVideo()">Get Video</button>

<select id="type" onchange="toggleQuality()">
<option value="mp4">MP4</option>
<option value="mp3">MP3</option>
</select>

<select id="quality"></select>

<div id="preview"></div>

<button onclick="download()">Download</button>

</div>

<script>

let currentPlatform = ""

function getVideo(){
    let url = document.getElementById("url").value

    fetch("/info",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url})
    })
    .then(res=>res.json())
    .then(data=>{

        if(data.error){
            alert(data.error)
            return
        }

        currentPlatform = data.platform

        // preview
        document.getElementById("preview").innerHTML = `
            ${data.thumbnail ? `<img src="${data.thumbnail}">` : ""}
            <p>${data.title}</p>
        `

        let q = document.getElementById("quality")
        q.innerHTML = ""

        if(data.platform === "youtube"){
            data.formats.forEach(f=>{
                let opt = document.createElement("option")
                opt.value = f.format_id
                opt.text = f.quality
                q.appendChild(opt)
            })
            q.style.display="block"
        } else {
            q.style.display="none"
        }

    })
}

function toggleQuality(){
    let type = document.getElementById("type").value
    let q = document.getElementById("quality")

    if(type === "mp3"){
        q.style.display="none"
    } else {
        if(currentPlatform === "youtube"){
            q.style.display="block"
        }
    }
}

function download(){
    let url = document.getElementById("url").value
    let type = document.getElementById("type").value
    let format_id = document.getElementById("quality").value

    fetch("/download",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url,type,format_id})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.error){
            alert(data.error)
            return
        }

        window.location = "/file?id=" + data.id
    })
}

</script>

</body>
</html>
