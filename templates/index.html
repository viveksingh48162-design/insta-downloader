<!DOCTYPE html>
<html>
<head>
<title>🚀 Vidzo Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:sans-serif;
min-height:100vh;
background:linear-gradient(135deg,#ff6a6a,#6a8dff);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

/* 🔥 FULL WIDTH MOBILE CARD */
.container{
width:100%;
max-width:500px;
margin:10px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* 📱 MOBILE FULL HEIGHT FEEL */
@media(max-width:600px){
body{
align-items:flex-start;
padding-top:40px;
}

.container{
max-width:100%;
margin:15px;
padding:20px;
border-radius:15px;
}
}

h1{
font-size:22px;
margin-bottom:15px;
}

/* INPUT */
input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
outline:none;
font-size:16px;
}

/* BUTTON */
.btn{
margin-top:12px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* OPTIONS */
.box{
background:rgba(255,255,255,0.2);
margin-top:12px;
padding:14px;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.box:hover{
transform:scale(1.05);
}

/* LOADER */
#loader{
display:none;
margin-top:15px;
}

.progress-bar{
height:6px;
background:#ccc;
border-radius:10px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#00c6ff;
transition:0.3s;
}

/* IMAGE */
img{
margin-top:10px;
border-radius:10px;
width:100%;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Vidzo Ultra Downloader</h1>

<input id="url" placeholder="Paste video URL here">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="loader">
<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div id="video"></div>
<div id="options"></div>

</div>

<script>

let URL=""
let formatsData={}
let progress=0
let interval

document.getElementById("url").addEventListener("input",autoFetch)

// 🔥 AUTO FETCH
async function autoFetch(){

URL=document.getElementById("url").value.trim()

if(!URL){
video.innerHTML=""
options.innerHTML=""
return
}

loader.style.display="block"
video.innerHTML=""
options.innerHTML=""

progress=0
interval=setInterval(()=>{
if(progress<90){
progress+=5
progressFill.style.width=progress+"%"
}
},200)

let res = await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

let data = await res.json()

clearInterval(interval)
progressFill.style.width="100%"
setTimeout(()=>loader.style.display="none",400)

if(data.error){
video.innerHTML=data.error
return
}

// 🎬 SHOW VIDEO
video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}">
`

// ⚡ SHORTS / SOCIAL
if(data.is_short || data.is_social){
options.innerHTML=`
<div class="box" onclick="fast('video')">⚡ FAST MP4</div>
<div class="box" onclick="fast('audio')">⚡ FAST MP3</div>
`
return
}

// NORMAL
options.innerHTML=`
<div class="box" onclick="fast('video')">⚡ FAST MP4</div>
<div class="box" onclick="fast('audio')">⚡ FAST MP3</div>
<div class="box" onclick="turbo()">🚀 TURBO (HD)</div>
`
}


// ⚡ FAST
function fast(type){
fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,type:type,mode:"fast"})
})
.then(r=>r.json())
.then(d=>{
if(d.type==="direct"){
window.location.href=d.url
}else{
window.location.href="/file/"+d.file+"/"+d.ext
}
})
}


// 🚀 TURBO
async function turbo(){

options.innerHTML="Loading quality..."

let res = await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
})

formatsData = await res.json()

options.innerHTML=`
<div class="box" onclick="showMP4()">🎬 MP4</div>
<div class="box" onclick="showMP3()">🎧 MP3</div>
`
}


// 🎬 MP4
function showMP4(){
let html=""
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${v.format_id}','video','turbo')">${v.quality}</div>`
})
options.innerHTML=html
}


// 🎧 MP3
function showMP3(){
options.innerHTML=`
<div class="box" onclick="download('best','audio','turbo')">128kbps</div>
`
}


// ⬇ DOWNLOAD
function download(format_id,type,mode){
fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,format_id,type,mode})
})
.then(r=>r.json())
.then(d=>{
if(d.type==="direct"){
window.location.href=d.url
}else{
window.location.href="/file/"+d.file+"/"+d.ext
}
})
}

</script>

</body>
</html>
