<!DOCTYPE html>
<html>
<head>
    <title>🔥 Vidzo Downloader</title>

    <style>
        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            font-family:sans-serif;
            color:white;
            text-align:center;
        }

        .container{
            max-width:400px;
            margin:auto;
            padding:20px;
        }

        .card{
            background:rgba(255,255,255,0.1);
            padding:20px;
            border-radius:20px;
            backdrop-filter:blur(10px);
        }

        input,select,button{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
        }

        button{
            background:red;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        img{
            width:100%;
            border-radius:10px;
            margin-top:10px;
        }

        .progress{
            height:20px;
            background:#ddd;
            border-radius:10px;
            overflow:hidden;
        }

        .bar{
            height:100%;
            width:0%;
            background:lime;
        }
    </style>
</head>

<body>

<div class="container">
<div class="card">

<h2>🔥 Vidzo Downloader</h2>

<input id="url" placeholder="Paste link">

<button onclick="getVideo()">Get Video</button>

<h3 id="title"></h3>

<img id="thumb" style="display:none">

<select id="type" onchange="changeType()">
    <option value="mp4">MP4</option>
    <option value="mp3">MP3</option>
</select>

<select id="quality"></select>

<button onclick="download()">⬇ Download</button>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<p id="info">0% | 0 KB/s</p>

</div>
</div>

<script>

let currentUrl="";
let platform="";

// 🔥 RESET UI
function reset(){
    document.getElementById("bar").style.width="0%";
    document.getElementById("info").innerText="0% | 0 KB/s";
}

// 🔥 GET VIDEO INFO
async function getVideo(){

    reset();

    let url=document.getElementById("url").value;
    currentUrl=url;

    let res=await fetch("/info",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url})
    });

    let data=await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    platform=data.platform;

    document.getElementById("title").innerText=data.title || "No Title";

    if(data.thumbnail){
        let img=document.getElementById("thumb");
        img.src=data.thumbnail;
        img.style.display="block";
    }

    let quality=document.getElementById("quality");
    quality.innerHTML="";

    if(platform==="youtube"){
        data.formats.forEach(f=>{
            let opt=document.createElement("option");
            opt.value=f.format_id;
            opt.text=f.quality;
            quality.appendChild(opt);
        });
    }else{
        let opt=document.createElement("option");
        opt.text="Auto";
        opt.value="best";
        quality.appendChild(opt);
    }

    changeType();
}

// 🔥 TYPE CHANGE (MP3 / MP4)
function changeType(){

    reset();

    let type=document.getElementById("type").value;
    let quality=document.getElementById("quality");

    if(type==="mp3"){
        quality.style.display="none";
    }else{
        if(platform==="youtube"){
            quality.style.display="block";
        }else{
            quality.style.display="none";
        }
    }
}

// 🔥 DOWNLOAD
async function download(){

    reset();

    let type=document.getElementById("type").value;
    let format=document.getElementById("quality").value;

    let res=await fetch("/download",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            url:currentUrl,
            type:type,
            format_id:format
        })
    });

    let data=await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    track(data.id);
}

// 🔥 PROGRESS TRACK
function track(id){

    let interval=setInterval(async ()=>{

        let r=await fetch("/progress");
        let p=await r.json();

        document.getElementById("bar").style.width=p.percent+"%";
        document.getElementById("info").innerText=p.percent+"% | "+p.speed;

        if(p.percent>=100){
            clearInterval(interval);
            window.location="/file?id="+id;
        }

    },1000);
}

</script>

</body>
</html>
