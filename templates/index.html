<!DOCTYPE html>
<html>
<head>
<title>Vidzo Downloader 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#36d1dc,#5b86e5,#ff9966,#ee0979);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
width:100%;
max-width:520px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

h2{margin-bottom:10px;}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:15px;
outline:none;
}

.btn{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-weight:bold;
cursor:pointer;
}

.box{
background:rgba(255,255,255,0.25);
margin-top:10px;
padding:12px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.box:hover{transform:scale(1.04);}

img{
width:100%;
max-width:260px;
margin-top:10px;
border-radius:12px;
}

#loader{display:none;margin-top:15px;}
.progress{
height:6px;
background:rgba(255,255,255,0.3);
border-radius:10px;
overflow:hidden;
}
.progress div{
height:100%;
width:0%;
background:#00c6ff;
transition:0.3s;
}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Vidzo Downloader</h2>

<input id="url" placeholder="Paste video URL here">
<button class="btn" onclick="autoFetch()">Get Video</button>

<div id="loader">
<div class="progress"><div id="bar"></div></div>
</div>

<div id="video"></div>
<div id="options"></div>
</div>

<script>
let URL="";
let videoData={};
let formatsData={};
let interval;

// 🔥 AutoFetch
let timer;
document.getElementById("url").addEventListener("input", ()=>{
clearTimeout(timer);
timer=setTimeout(autoFetch,800);
});

async function autoFetch(){

URL=document.getElementById("url").value.trim();

if(!URL){
video.innerHTML="";
options.innerHTML="";
return;
}

// loader start
loader.style.display="block";
bar.style.width="0%";
let p=0;

interval=setInterval(()=>{
if(p<90){p+=5;bar.style.width=p+"%";}
},200);

// API call
let res=await fetch("/get_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});

let data=await res.json();
videoData=data;

clearInterval(interval);
bar.style.width="100%";
setTimeout(()=>loader.style.display="none",400);

if(data.error){
video.innerHTML="<p>"+data.error+"</p>";
return;
}

// show video
video.innerHTML=`
<h3>${data.title}</h3>
<img src="${data.thumbnail}">
`;

// options
options.innerHTML=`
<div class="box" onclick="fast()">⚡ FAST</div>
<div class="box" onclick="turbo()">🚀 TURBO</div>
`;
}

// ⚡ FAST
function fast(){
if(videoData.is_short || videoData.is_social){
options.innerHTML=`
<div class="box" onclick="download('best','video')">MP4</div>
<div class="box" onclick="download('bestaudio','audio')">MP3</div>
`;
}else{
getFormats();
}
}

// 🚀 TURBO
function turbo(){
fast();
}

// 🎯 GET FORMATS
async function getFormats(){

let res=await fetch("/get_formats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL})
});

formatsData=await res.json();

options.innerHTML=`
<div class="box" onclick="showMP4()">MP4 (Quality)</div>
<div class="box" onclick="showMP3()">MP3</div>
`;
}

// 📹 MP4 QUALITY
function showMP4(){
let html="";
formatsData.video.forEach(v=>{
html+=`<div class="box" onclick="download('${v.format_id}','video')">${v.quality}</div>`;
});
options.innerHTML=html;
}

// 🎧 MP3
function showMP3(){
options.innerHTML=`
<div class="box" onclick="download('bestaudio','audio')">128kbps</div>
<div class="box" onclick="download('bestaudio','audio')">256kbps</div>
`;
}

// 🔥 DOWNLOAD (FFmpeg + Direct hybrid)
function download(format_id,type){

fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:URL,format_id,type})
})
.then(r=>r.json())
.then(d=>{
if(d.error){
alert(d.error);
return;
}

// 🎬 FFmpeg merged file
if(d.file){
window.open("/file/"+d.file);
}

// ⚡ direct link
else if(d.direct){
window.open(d.direct);
}

});
}
</script>

</body>
</html>
