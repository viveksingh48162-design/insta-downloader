<!DOCTYPE html>
<html>
<head>
<title>Vidzo Online🚀</title>

<style>
body {
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    text-align: center;
    color: white;
}

input {
    padding: 12px;
    width: 300px;
    border-radius: 10px;
}

.box {
    background: rgba(255,255,255,0.2);
    margin: 10px;
    padding: 12px;
    cursor: pointer;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🚀 Vidzo Downloader</h1>

<input id="url" placeholder="Paste URL">
<br><br>

<button onclick="load()">Get Video</button>

<div id="video"></div>
<div id="options"></div>

<script>

let URL = ""

function load(){
    URL = document.getElementById("url").value

    fetch("/get_video", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{

        document.getElementById("video").innerHTML =
            `<h3>${data.title}</h3>
             <img src="${data.thumbnail}" width="200"><br>`

        loadFormats(data.is_short)
    })
}


function loadFormats(is_short){

    fetch("/get_formats", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:URL})
    })
    .then(r=>r.json())
    .then(data=>{

        let html = ""

        // 🔥 SHORT MODE
        if(data.short){
            html += `<div class="box" onclick="download('best','video')">🎥 Download MP4</div>`
            html += `<div class="box" onclick="download('best','audio')">🎧 Download MP3</div>`
        }

        // 🎬 LONG VIDEO
        else{
            data.video.forEach(v=>{
                html += `<div class="box" onclick="download('${v.format_id}','video')">${v.quality}</div>`
            })

            html += `<div class="box" onclick="download('best','audio')">🎧 MP3</div>`
        }

        document.getElementById("options").innerHTML = html
    })
}


function download(format_id, type){
    fetch("/download", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            url:URL,
            format_id,
            type
        })
    })
    .then(r=>r.json())
    .then(data=>{
        window.open(data.download_url)
    })
}

</script>

</body>
</html>
